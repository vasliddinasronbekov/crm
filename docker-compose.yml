version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:14-alpine
    container_name: eduvoice_db
    environment:
      POSTGRES_DB: eduvoice_db
      POSTGRES_USER: eduvoice_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-eduvoice_secure_pass}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - eduvoice_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduvoice_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: eduvoice_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - eduvoice_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Django Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eduvoice_backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py migrate --database=analytics &&
             gunicorn edu_project.wsgi:application --bind 0.0.0.0:8008 --workers 4 --timeout 60 --access-logfile - --error-logfile -"
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - logs_volume:/app/logs
    ports:
      - "8008:8008"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgres://eduvoice_user:${DB_PASSWORD:-eduvoice_secure_pass}@db:5432/eduvoice_db
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eduvoice_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Daphne (WebSocket/ASGI Server)
  daphne:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eduvoice_daphne
    command: daphne -b 0.0.0.0 -p 8009 edu_project.asgi:application
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8009:8009"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgres://eduvoice_user:${DB_PASSWORD:-eduvoice_secure_pass}@db:5432/eduvoice_db
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - db
      - redis
    networks:
      - eduvoice_network
    restart: unless-stopped

  # Celery Worker (Background Tasks)
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eduvoice_celery_worker
    command: celery -A edu_project worker -l info --concurrency=4
    volumes:
      - ./backend:/app
      - media_volume:/app/media
      - logs_volume:/app/logs
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgres://eduvoice_user:${DB_PASSWORD:-eduvoice_secure_pass}@db:5432/eduvoice_db
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - eduvoice_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A edu_project inspect ping"]
      interval: 60s
      timeout: 10s
      retries: 3

  # Celery Beat (Scheduled Tasks)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eduvoice_celery_beat
    command: celery -A edu_project beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
      - logs_volume:/app/logs
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgres://eduvoice_user:${DB_PASSWORD:-eduvoice_secure_pass}@db:5432/eduvoice_db
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - eduvoice_network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: eduvoice_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static_volume:/staticfiles:ro
      - media_volume:/media:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - daphne
    networks:
      - eduvoice_network
    restart: unless-stopped

# Named volumes for persistence
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
  logs_volume:
    driver: local

# Network
networks:
  eduvoice_network:
    driver: bridge
